version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: nkco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nkco
      POSTGRES_PASSWORD: nkco123
      POSTGRES_DB: nkco_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nkco"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
